<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashwise - быстро и просто</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="card">
        <h1>⇄ Cashwise - Конвертер валют</h1>

        <div>
            <p class="label">Сумма</p>
            <div class="input-group">
                <input type="number" id="amount" value="1">
                <select id="from-currency"></select>
            </div>
        </div>

        <div class="swap">
            <button id="swap-btn">⇅</button>
        </div>

        <div>
            <p class="label">Результат</p>
            <div class="input-group">
                <input type="number" id="result" disabled>
                <select id="to-currency"></select>
            </div>
        </div>

        <p id="rate-info"></p>

        <button id="convert-btn">Конвертировать</button>
        <div id="history" class="history"></div>
        <button id="clear-history" style="display:none;">Очистить историю</button>
        <div id="chart-wrap" style="display:none;">
            <p class="label">График за 7 дней</p>
            <canvas id="chart"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
